<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>worldsplat — Build a world, bring it to life.</title>
	<meta name="description" content="worldsplat turns rough sketches into explorable 3D worlds, one seamless gaussian splat at a time.">
	<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='%23111110'%3E%3Cellipse cx='9' cy='10' rx='6' ry='5.2' transform='rotate(-18 9 10)'/%3E%3Cellipse cx='17' cy='8.5' rx='3.4' ry='2.9' transform='rotate(24 17 8.5)'/%3E%3Cellipse cx='15.5' cy='16.5' rx='4.4' ry='3.6' transform='rotate(-8 15.5 16.5)'/%3E%3Ccircle cx='6.5' cy='17.5' r='2.1'/%3E%3C/g%3E%3C/svg%3E">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=Newsreader:opsz,wght@6..72,400..600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/site.css">
	<!-- Start the heavy downloads during HTML parse — without these, nothing is
	     fetched until the module graph (including the spark CDN import) resolves. -->
	<link rel="modulepreload" href="/lib/three.module.js">
	<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js">
	<link rel="preload" href="/assets/reveal-points.bin?v=2" as="fetch" crossorigin>
	<link rel="preload" href="/assets/reveal-splat.ply" as="fetch" crossorigin>
	<link rel="preload" href="/assets/japanese-courtyard-blockout.json" as="fetch" crossorigin>
	<link rel="preload" href="/assets/hero-splat.ply" as="fetch" crossorigin>
	<link rel="preload" href="/assets/japanese-courtyard.ply" as="fetch" crossorigin>
	<script>
		// "/" is the registered Hugging Face OAuth redirect URL; hand callback
		// hits to the sign-in page, which finishes the token exchange.
		if (/[?&](code|error)=/.test(location.search)) location.replace("/login" + location.search + location.hash)
	</script>
	<script type="importmap">
	{
		"imports": {
			"three": "/lib/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
			"spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
		}
	}
	</script>
	<style>
		main { max-width: 1440px; margin: 0 auto; padding: 0 36px; }

		/* ---- hero ---- */
		.hero {
			display: grid;
			grid-template-columns: 1.15fr 0.85fr;
			gap: 48px;
			align-items: center;
			padding: 52px 0 36px;
		}
		.hero h1 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(46px, 6.2vw, 82px);
			font-weight: 400;
			line-height: 1.05;
			letter-spacing: -0.012em;
			text-wrap: balance;
		}
		.hero-cta { display: flex; gap: 12px; margin-top: 40px; }
		.pill-hf {
			height: 56px;
			gap: 14px;
			padding: 0 22px 0 10px;
			border-radius: 16px;
			font-size: 17px;
			font-weight: 600;
		}
		.pill-hf .hf-badge {
			display: grid;
			place-items: center;
			width: 38px;
			height: 38px;
			border-radius: 11px;
			background: #ffd66b;
			font-size: 19px;
		}
		.pill-hf svg {
			width: 19px;
			height: 19px;
			margin-left: 6px;
			fill: none;
			stroke: currentColor;
			stroke-width: 1.8;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		[data-hf-login][aria-busy="true"] { opacity: 0.7; pointer-events: none; }
		.hero-copy {
			margin-top: 22px;
			font-size: 18px;
			line-height: 1.55;
			color: var(--ink-soft);
			max-width: 46ch;
		}

		/* ---- hero cursor-follower splat (right column) ---- */
		.hero-stage {
			position: relative;
			height: clamp(570px, 51vw, 810px); /* 1.5× — the mech scales with its canvas */
			overflow: hidden;
		}
		.hero-stage canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			pointer-events: none; /* ambient — it watches the cursor, never captures it */
		}

		/* ---- showcase: floating card on the left, copy on the right ---- */
		/* Scroll-driven morph: the tall band supplies the scroll distance while the
		   row stays sticky inside it; scroll progress (or dragging the slider)
		   scrubs the sketch layer's opacity so the block-out dissolves into the
		   real splat. The world sits on a rounded white card with a soft shadow;
		   the canvas clears to the same white so there is no inner window. */
		.showcase-scroll { height: 300vh; margin-bottom: 28px; }
		.showcase {
			position: sticky;
			top: max(10px, calc(14vh - 28px)); /* centers the ~(72vh + 56px) block */
			display: grid;
			grid-template-columns: 1.05fr 0.95fr;
			gap: clamp(28px, 4vw, 64px);
			align-items: center;
		}
		.showcase-box {
			border-radius: 26px;
			padding: 0 16px 16px;
			background: var(--white);
			box-shadow:
				0 1px 2px rgba(20, 20, 15, 0.04),
				0 10px 24px rgba(20, 20, 15, 0.05),
				0 28px 64px rgba(20, 20, 15, 0.08);
			overflow: hidden;
		}
		.showcase-copy { justify-self: end; text-align: right; } /* pinned to the row's right edge */
		.showcase-copy h2 u {
			text-decoration-thickness: 0.045em;
			text-underline-offset: 0.09em;
		}
		.showcase-copy h2 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			line-height: 1.05;
			letter-spacing: -0.012em;
			text-wrap: balance;
			max-width: 14ch;
		}
		/* the slider at top center — scroll progress, sketch → splat; draggable */
		.morph-row {
			display: flex;
			justify-content: center;
			padding: 14px 2px 18px;
			cursor: pointer;
			touch-action: none; /* drag seeks; it must not pan the page */
		}
		/* liquid-glass: frosted groove, translucent white fill, glass knob */
		.morph {
			position: relative;
			width: min(380px, 60%);
			height: 10px;
			border-radius: 9999px;
			background: rgba(13, 13, 12, 0.07);
			box-shadow:
				inset 0 1px 2px rgba(20, 20, 15, 0.09),
				inset 0 0 0 0.5px rgba(20, 20, 15, 0.04);
		}
		.morph-fill {
			position: absolute;
			inset: 0;
			width: calc(var(--p, 0) * 100%);
			border-radius: inherit;
			background: rgba(255, 255, 255, 0.85);
			-webkit-backdrop-filter: blur(6px) saturate(1.4);
			backdrop-filter: blur(6px) saturate(1.4);
			box-shadow:
				inset 0 0 0 0.5px rgba(255, 255, 255, 0.9),
				0 1px 3px rgba(20, 20, 15, 0.08);
		}
		.morph-knob {
			position: absolute;
			top: 50%;
			left: calc(var(--p, 0) * 100%);
			width: 26px;
			height: 26px;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.72);
			-webkit-backdrop-filter: blur(10px) saturate(1.5);
			backdrop-filter: blur(10px) saturate(1.5);
			box-shadow:
				inset 0 1px 1px rgba(255, 255, 255, 0.95),
				inset 0 -1px 1px rgba(20, 20, 15, 0.06),
				0 0 0 0.5px rgba(20, 20, 15, 0.08),
				0 1px 2px rgba(20, 20, 15, 0.16),
				0 6px 16px rgba(20, 20, 15, 0.16);
			transform: translate(-50%, -50%);
			transition: transform 0.15s ease;
		}
		.morph-row:active .morph-knob { transform: translate(-50%, -50%) scale(1.12); } /* swells on grab */
		.stage {
			position: relative;
			height: min(72vh, 760px);
			min-height: 460px;
			background: var(--white);
			overflow: hidden;
			touch-action: none;
		}
		.stage canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
			opacity: 0;
			background: var(--white); /* hard-opaque backing so layers can't bleed through */
		}
		/* Bottom (splat) layer: revealed instantly — it only ever shows through the
		   top layer's fade, so transitioning it just invites compositor glitches. */
		.stage canvas.base { opacity: 1; }
		/* Top (sketch) layer: scroll progress drives its inline opacity — no CSS
		   transition, the scrub itself is the animation. */
		.stage canvas.fade { will-change: opacity; }
		.stage canvas:active { cursor: grabbing; }
		.stage-hint {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 15px;
			color: var(--ink-faint);
			pointer-events: none;
		}

		/* ---- shared eyebrow (mono, technical) ---- */
		.eyebrow {
			font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			font-size: 12px;
			font-weight: 500;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--ink-faint);
		}

		/* ---- scroll-reveal: the gaussian resolves from its centre ---- */
		.reveal {
			position: relative;
			min-height: min(88vh, 820px);
			margin-top: 44px;
			border-top: 1px solid var(--line);
			border-bottom: 1px solid var(--line);
			background: var(--paper);
			overflow: hidden;
			isolation: isolate;
		}
		.reveal-grid {
			position: absolute;
			inset: 0;
			background-image:
				linear-gradient(to right, rgba(13, 13, 12, 0.045) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(13, 13, 12, 0.045) 1px, transparent 1px);
			background-size: 46px 46px;
			-webkit-mask-image: radial-gradient(125% 92% at 50% 46%, #000 52%, transparent 100%);
			mask-image: radial-gradient(125% 92% at 50% 46%, #000 52%, transparent 100%);
			pointer-events: none;
		}
		.reveal-code {
			position: absolute;
			inset: 0;
			overflow: hidden;
			pointer-events: none;
			-webkit-mask-image: radial-gradient(closest-side at 50% 50%, transparent 26%, #000 76%);
			mask-image: radial-gradient(closest-side at 50% 50%, transparent 26%, #000 76%);
		}
		.reveal-code pre {
			position: absolute;
			left: 0;
			right: 0;
			top: 0;
			margin: 0;
			padding: 0 clamp(16px, 4vw, 60px);
			font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			font-size: 12.5px;
			line-height: 1.9;
			color: rgba(13, 13, 12, 0.07);
			white-space: pre;
			will-change: transform;
			animation: code-drift 52s linear infinite;
		}
		@keyframes code-drift { to { transform: translateY(-50%); } }
		.reveal-canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			pointer-events: none;
			z-index: 1;
			transition: opacity 0.9s ease;
		}
		.reveal-canvas.hide { opacity: 0; }
		/* real gaussian render under the ASCII canvas — the build crossfades into it */
		.reveal-splat {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			pointer-events: none;
			z-index: 1;
			opacity: 0;
			transition: opacity 0.9s ease;
		}
		.reveal-splat.show { opacity: 1; }
		.reveal-lead {
			position: relative;
			z-index: 2;
			max-width: 1440px;
			margin: 0 auto;
			padding: clamp(44px, 7vw, 92px) 36px 0;
			pointer-events: none;
		}
		.reveal-lead h2 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			letter-spacing: -0.012em;
			line-height: 1.05;
			max-width: 17ch;
			text-wrap: balance;
		}
		/* sentence closes on the right of the gaussian — same serif voice as the hero */
		.reveal-tail {
			position: absolute;
			right: clamp(12px, 2.5vw, 48px);
			top: 82%;
			transform: translateY(-50%);
			z-index: 2;
			max-width: 9ch;
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			letter-spacing: -0.012em;
			line-height: 1.05;
			text-wrap: balance;
			pointer-events: none;
		}

		@media (prefers-reduced-motion: reduce) {
			.reveal-code pre { animation: none; }
		}
		@media (max-width: 900px) {
			main { padding: 0 20px; }
			.hero { grid-template-columns: 1fr; gap: 28px; padding: 32px 0 28px; }
			.hero-stage { height: 69vw; min-height: 390px; }
			.showcase-scroll { height: 220vh; }
			.showcase { top: max(10px, calc(21vh - 39px)); grid-template-columns: 1fr; gap: 22px; }
			.showcase-copy h2 { font-size: clamp(30px, 7vw, 44px); }
			.stage { height: 48vh; min-height: 320px; }
			.reveal { min-height: 78vh; }
			.reveal-lead { padding-left: 20px; padding-right: 20px; }
		}
	</style>
</head>
<body>
	<header class="nav">
		<a class="wordmark" href="/" aria-label="worldsplat home">
			<svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
				<ellipse cx="9" cy="10" rx="6" ry="5.2" transform="rotate(-18 9 10)"/>
				<ellipse cx="17" cy="8.5" rx="3.4" ry="2.9" transform="rotate(24 17 8.5)"/>
				<ellipse cx="15.5" cy="16.5" rx="4.4" ry="3.6" transform="rotate(-8 15.5 16.5)"/>
				<circle cx="6.5" cy="17.5" r="2.1"/>
			</svg>
			worldsplat
		</a>
		<div class="nav-cta">
			<a class="pill pill-black" href="/login" data-hf-login>Log in</a>
		</div>
	</header>

	<main>
		<section class="hero">
			<div>
				<h1>Build a world,<br>bring it to life.</h1>
				<p class="hero-copy">Powering daydreamers.<br>Turning your 3D primitives into splats.</p>
				<div class="hero-cta">
					<a class="pill pill-black pill-hf" href="/login" data-hf-login>
						<span class="hf-badge" aria-hidden="true">&#129303;</span>
						<span>Continue with Hugging Face</span>
						<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
					</a>
				</div>
			</div>
			<div class="hero-stage" id="hero-stage" aria-hidden="true"></div>
		</section>

		<div class="showcase-scroll" id="showcase-scroll">
			<section class="showcase" aria-label="Live world preview">
				<div class="showcase-box">
					<div class="morph-row" id="morph-row">
						<div class="morph"><div class="morph-fill"></div><div class="morph-knob"></div></div>
					</div>
					<div class="stage" id="stage">
						<div class="stage-hint" id="stage-hint">loading world&hellip;</div>
					</div>
				</div>
				<div class="showcase-copy">
					<h2>We transform <u>your creativity</u> into fantasy art.</h2>
				</div>
			</section>
		</div>
	</main>

	<section class="reveal" id="reveal" aria-label="A world is a cloud of splats">
		<div class="reveal-grid" aria-hidden="true"></div>
		<div class="reveal-code" id="reveal-code" aria-hidden="true"></div>
		<canvas class="reveal-canvas" id="reveal-canvas" aria-hidden="true"></canvas>
		<div class="reveal-lead">
			<h2>A world is a</h2>
		</div>
		<p class="reveal-tail" aria-hidden="true">a cloud of splats.</p>
	</section>

	

	<script type="module">
		// Nav "Log in" and the hero CTA start Hugging Face OAuth straight away —
		// /login stays only as the OAuth callback handler and no-JS fallback.
		import { getConfig } from "/scripts/api.js"
		import { configureHuggingFaceAuth, getHuggingFaceAuth, signInHuggingFace } from "/scripts/huggingface-auth.js"

		const configured = getConfig().then(config => configureHuggingFaceAuth(config?.generation))
		for (const cta of document.querySelectorAll("[data-hf-login]")) {
			cta.addEventListener("click", event => {
				event.preventDefault()
				cta.setAttribute("aria-busy", "true")
				configured
					.then(() => {
						if (getHuggingFaceAuth().signedIn) location.assign("/app/")
						else return signInHuggingFace()
					})
					.catch(() => location.assign("/login"))
			})
		}
	</script>
	<script type="module" src="/assets/bg.js?v=webgl-1"></script>
	<script type="module" src="/scripts/landing.js?v=worldsplat-14"></script>
	<script type="module" src="/scripts/hero-splat.js?v=5"></script>
</body>
</html>
