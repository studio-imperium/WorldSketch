<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WorldSketch</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<link rel="stylesheet" href="/styles.css">
	<script type="importmap">
	{
		"imports": {
			"three": "/lib/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
			"spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js",
			"fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
		}
	}
	</script>
</head>
<body>
	<div id="canvas"></div>
	<div class="draw-overlay" id="draw_overlay" aria-label="Top-down sketch pad">
		<canvas id="draw_canvas"></canvas>
	</div>
	<div class="ui">
		<div class="view-tabs" role="tablist" aria-label="Draw, build, or view the world">
			<button class="view-tab active" data-view-tab="draw" role="tab" aria-selected="true" title="Sketch your world top-down like a map">Draw</button>
			<button class="view-tab" data-view-tab="build" role="tab" aria-selected="false" disabled title="Edit the block-out (splats hidden)">Build</button>
			<button class="view-tab" data-view-tab="view" role="tab" aria-selected="false" disabled title="See the generated world (read-only)">View</button>
		</div>
		<aside class="frames-panel" aria-label="Frames">
			<header class="frames-head">
				<span id="frames_title">Frames</span>
				<button class="frames-add" id="frame_add_btn" type="button" title="New frame">+</button>
			</header>
			<div class="frames-list" id="frames_list"></div>
		</aside>
		<div class="palette-stack">
		<section class="color-palette card bg-base-100 shadow-xl border border-base-300" id="color_palette" aria-label="Color palette">
			<div class="card-body p-2">
				<div class="swatch-grid">
					<button class="color-swatch btn btn-ghost btn-square active" data-color="#000000" aria-label="DB32 black" title="DB32 black"><span style="background: #000000"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#222034" aria-label="DB32 ink" title="DB32 ink"><span style="background: #222034"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#45283c" aria-label="DB32 plum" title="DB32 plum"><span style="background: #45283c"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#663931" aria-label="DB32 brown red" title="DB32 brown red"><span style="background: #663931"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#8f563b" aria-label="DB32 brown" title="DB32 brown"><span style="background: #8f563b"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#df7126" aria-label="DB32 orange" title="DB32 orange"><span style="background: #df7126"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#d9a066" aria-label="DB32 tan" title="DB32 tan"><span style="background: #d9a066"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#eec39a" aria-label="DB32 peach" title="DB32 peach"><span style="background: #eec39a"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#fbf236" aria-label="DB32 yellow" title="DB32 yellow"><span style="background: #fbf236"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#99e550" aria-label="DB32 light green" title="DB32 light green"><span style="background: #99e550"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#6abe30" aria-label="DB32 green" title="DB32 green"><span style="background: #6abe30"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#37946e" aria-label="DB32 teal" title="DB32 teal"><span style="background: #37946e"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#4b692f" aria-label="DB32 dark green" title="DB32 dark green"><span style="background: #4b692f"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#524b24" aria-label="DB32 olive brown" title="DB32 olive brown"><span style="background: #524b24"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#323c39" aria-label="DB32 dark slate" title="DB32 dark slate"><span style="background: #323c39"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#3f3f74" aria-label="DB32 indigo" title="DB32 indigo"><span style="background: #3f3f74"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#306082" aria-label="DB32 blue" title="DB32 blue"><span style="background: #306082"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#5b6ee1" aria-label="DB32 bright blue" title="DB32 bright blue"><span style="background: #5b6ee1"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#639bff" aria-label="DB32 sky blue" title="DB32 sky blue"><span style="background: #639bff"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#5fcde4" aria-label="DB32 cyan" title="DB32 cyan"><span style="background: #5fcde4"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#cbdbfc" aria-label="DB32 pale blue" title="DB32 pale blue"><span style="background: #cbdbfc"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#ffffff" aria-label="DB32 white" title="DB32 white"><span style="background: #ffffff"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#9badb7" aria-label="DB32 light gray" title="DB32 light gray"><span style="background: #9badb7"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#847e87" aria-label="DB32 gray" title="DB32 gray"><span style="background: #847e87"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#696a6a" aria-label="DB32 dark gray" title="DB32 dark gray"><span style="background: #696a6a"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#595652" aria-label="DB32 warm gray" title="DB32 warm gray"><span style="background: #595652"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#76428a" aria-label="DB32 purple" title="DB32 purple"><span style="background: #76428a"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#ac3232" aria-label="DB32 red" title="DB32 red"><span style="background: #ac3232"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#d95763" aria-label="DB32 salmon" title="DB32 salmon"><span style="background: #d95763"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#d77bba" aria-label="DB32 pink" title="DB32 pink"><span style="background: #d77bba"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#8f974a" aria-label="DB32 muted green" title="DB32 muted green"><span style="background: #8f974a"></span></button>
					<button class="color-swatch btn btn-ghost btn-square" data-color="#8a6f30" aria-label="DB32 ochre" title="DB32 ochre"><span style="background: #8a6f30"></span></button>
					<button class="add-color-swatch btn btn-ghost btn-square" id="add_color_btn" aria-label="Add color" title="Add color">
						<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
					</button>
					<input type="color" id="custom_color_input" value="#639bff" hidden>
				</div>
			</div>
		</section>
		<section class="brush-palette card bg-base-100 shadow-xl border border-base-300" id="brush_palette" aria-label="Brush size">
			<div class="card-body p-2">
				<div class="brush-grid">
					<button class="brush-swatch btn btn-ghost btn-square" data-scale="0.5" aria-label="Tiny" title="Tiny"><span style="width: 0.7rem; height: 0.7rem"></span></button>
					<button class="brush-swatch btn btn-ghost btn-square" data-scale="0.75" aria-label="Small" title="Small"><span style="width: 0.95rem; height: 0.95rem"></span></button>
					<button class="brush-swatch btn btn-ghost btn-square active" data-scale="1" aria-label="Medium" title="Medium"><span style="width: 1.3rem; height: 1.3rem"></span></button>
					<button class="brush-swatch btn btn-ghost btn-square" data-scale="1.75" aria-label="Large" title="Large"><span style="width: 1.7rem; height: 1.7rem"></span></button>
				</div>
			</div>
		</section>
		</div>
		<div class="settings-menu" id="settings_menu">
			<button class="settings-btn btn btn-square" id="settings_btn" aria-label="Settings" aria-haspopup="true" aria-expanded="false" title="Settings">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"></path><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path></svg>
			</button>
			<div class="settings-popover hidden" id="settings_popover" role="menu">
				<button class="settings-item" id="floor_shot_btn" title="Download the isometric floor capture used for generation">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h2l2 -2h6l2 2h2a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-9a2 2 0 0 1 2 -2"></path><path d="M9 13a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path></svg>
					<span>Screenshot floor</span>
				</button>
				<label class="settings-item" id="view_raw_splat_label" title="Open one .splat/.ply file exactly as stored, without fitting, culling, or transforms">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path><path d="M7 9l5 -5l5 5"></path><path d="M12 4l0 12"></path></svg>
					<span>View raw splat</span>
					<input type="file" id="view_raw_splat_input" accept=".splat,.ply" hidden>
				</label>
				<label class="settings-item" id="upload_splats_label" title="Upload one or more .splat/.ply files and fit them to the current primitives">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path><path d="M7 9l5 -5l5 5"></path><path d="M12 4l0 12"></path></svg>
					<span>Upload + fit splats</span>
					<input type="file" id="upload_splats_input" accept=".splat,.ply" multiple hidden>
				</label>
				<button class="settings-item" id="download_prims_btn" title="Save the block-out primitives to a JSON file">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h10l4 4v10a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2"></path><path d="M12 14m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"></path><path d="M14 4l0 4l-6 0l0 -4"></path></svg>
					<span>Download primitives</span>
				</button>
				<label class="settings-item" id="upload_prims_label" title="Load block-out primitives from a JSON file (replaces the current block-out)">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2"></path></svg>
					<span>Upload primitives</span>
					<input type="file" id="upload_prims_input" accept=".json" hidden>
				</label>
				<button class="settings-item" id="download_zip_btn" title="Export splats + primitives as a ZIP for quick re-fitting">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path><path d="M7 11l5 5l5 -5"></path><path d="M12 4l0 12"></path></svg>
					<span>Download session ZIP</span>
				</button>
				<label class="settings-item" id="upload_zip_label" title="Re-fit a previously exported ZIP to the current primitives (skips generation)">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path><path d="M7 9l5 -5l5 5"></path><path d="M12 4l0 12"></path></svg>
					<span>Upload session ZIP</span>
					<input type="file" id="upload_zip_input" accept=".zip" hidden>
				</label>
				<button class="settings-item" id="history_toggle_btn" title="Build history - restore a previous build's splats without regenerating">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8l0 4l2 2"></path><path d="M3.05 11a9 9 0 1 1 .5 4"></path><path d="M3 16v-5h5"></path></svg>
					<span>Build history</span>
				</button>
				<div class="settings-divider" aria-hidden="true"></div>
				<label class="settings-item settings-toggle" title="Overlay the original primitive colliders on the generated splats to check how well each lines up">
					<span>Colliders</span>
					<input type="checkbox" id="show_colliders_input" class="toggle toggle-sm">
				</label>
				<label class="settings-item settings-toggle" title="Draw each generated splat's content bounding box to check how it sits relative to its colliders">
					<span>Bounds</span>
					<input type="checkbox" id="show_splat_box_input" class="toggle toggle-sm">
				</label>
			</div>
		</div>
		<aside class="history-panel hidden" id="history_panel" aria-label="Build history">
			<header class="history-head">
				<span class="history-heading">Builds <span class="history-count" id="history_count"></span></span>
				<button class="history-clear" id="history_clear_btn" type="button" title="Delete all saved builds">Clear</button>
				<button class="history-close" id="history_close_btn" type="button" aria-label="Close build history" title="Close">x</button>
			</header>
			<p class="history-empty" id="history_empty">No builds yet - hit Generate and your worlds land here.</p>
			<div class="history-list" id="history_list"></div>
		</aside>
		<div class="bottom-dock">
			<div class="chat-dock">
				<div class="gen-progress hidden" id="progress" aria-live="polite">
					<div class="gen-progress-track"><span class="gen-progress-fill" id="progress_fill"></span></div>
					<span class="gen-progress-label" id="progress_label"></span>
				</div>
				<p class="status hidden text-sm text-base-content/70" id="status"></p>
				<form class="chat-bar" id="chat_form">
					<input class="chat-input" id="chat_prompt" type="text" autocomplete="off" placeholder="Describe your scene...">
					<button class="chat-send btn btn-square" id="generate_btn" type="submit" aria-label="Generate world" title="Generate">
						<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6v6a3 3 0 0 1 -3 3h-10"></path><path d="M9 18l-3 -3l3 -3"></path></svg>
					</button>
				</form>
			</div>
			<nav class="tool-dock join bg-base-100 shadow-xl border border-base-300" aria-label="Primitive tools">
			<button class="tool-btn btn btn-ghost btn-square join-item active" data-tool="pointer" aria-label="Pointer" title="Pointer">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.904 17.563a1.2 1.2 0 0 0 2.228 .308l2.09 -3.093l4.907 4.907a1.067 1.067 0 0 0 1.509 0l1.047 -1.047a1.067 1.067 0 0 0 0 -1.509l-4.907 -4.907l3.113 -2.09a1.2 1.2 0 0 0 -.309 -2.228l-13.582 -3.904l3.904 13.563"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="move" aria-label="Move tool" title="Move">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 9l3 3l-3 3"></path><path d="M15 12h6"></path><path d="M6 9l-3 3l3 3"></path><path d="M3 12h6"></path><path d="M9 18l3 3l3 -3"></path><path d="M12 15v6"></path><path d="M9 6l3 -3l3 3"></path><path d="M12 3v6"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="scale" aria-label="Scale tool" title="Scale">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 4h4v4"></path><path d="M14 10l6 -6"></path><path d="M8 20h-4v-4"></path><path d="M4 20l6 -6"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="rotate" aria-label="Rotate tool" title="Rotate">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.05 11a8 8 0 1 1 1.95 8"></path><path d="M4 4v7h7"></path><path d="M4.05 11a8.04 8.04 0 0 1 2.35 -4.6"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="eraser" aria-label="Eraser" title="Eraser">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 20h-10.5l-4.21 -4.3a1 1 0 0 1 0 -1.41l10 -10a1 1 0 0 1 1.41 0l5 5a1 1 0 0 1 0 1.41l-9.2 9.3"></path><path d="M18 13.3l-6.3 -6.3"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="paint" aria-label="Terrain paint" title="Paint terrain on the floor (rivers, paths, rock) in the active colour">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21v-4a4 4 0 1 1 4 4h-4"></path><path d="M21 3a16 16 0 0 0 -12.8 10.2"></path><path d="M21 3a16 16 0 0 1 -10.2 12.8"></path><path d="M10.6 9a9 9 0 0 1 4.4 4.4"></path></svg>
			</button>
			<span class="dock-divider" aria-hidden="true"></span>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-tool="box" aria-label="Box tool" title="Box">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 16.008v-8.018a1.98 1.98 0 0 0 -1 -1.717l-7 -4.008a2.016 2.016 0 0 0 -2 0l-7 4.008c-.619 .355 -1 1.01 -1 1.718v8.018c0 .709 .381 1.363 1 1.717l7 4.008a2.016 2.016 0 0 0 2 0l7 -4.008c.619 -.355 1 -1.01 1 -1.718"></path><path d="M12 22v-10"></path><path d="M12 12l8.73 -5.04"></path><path d="M3.27 6.96l8.73 5.04"></path></svg>
			</button>
			</nav>
			<nav class="draw-dock join bg-base-100 shadow-xl border border-base-300" aria-label="Sketch tools">
			<button class="tool-btn btn btn-ghost btn-square join-item active" data-draw-tool="pen" aria-label="Pencil" title="Pencil">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"></path><path d="M13.5 6.5l4 4"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-draw-tool="eraser" aria-label="Eraser" title="Eraser">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 20h-10.5l-4.21 -4.3a1 1 0 0 1 0 -1.41l10 -10a1 1 0 0 1 1.41 0l5 5a1 1 0 0 1 0 1.41l-9.2 9.3"></path><path d="M18 13.3l-6.3 -6.3"></path></svg>
			</button>
			<button class="tool-btn btn btn-ghost btn-square join-item" data-draw-tool="pan" aria-label="Grab and pan" title="Pan around the canvas">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 13v-8.5a1.5 1.5 0 0 1 3 0v7.5"></path><path d="M11 11.5v-2a1.5 1.5 0 0 1 3 0v2.5"></path><path d="M14 10.5a1.5 1.5 0 0 1 3 0v1.5"></path><path d="M17 11.5a1.5 1.5 0 0 1 3 0v4.5a6 6 0 0 1 -6 6h-2h.208a6 6 0 0 1 -5.012 -2.7a69.74 69.74 0 0 1 -.196 -.3c-.312 -.479 -1.407 -2.388 -3.286 -5.728a1.5 1.5 0 0 1 .536 -2.022a1.867 1.867 0 0 1 2.28 .28l1.47 1.47"></path></svg>
			</button>
			<span class="dock-divider" aria-hidden="true"></span>
			<button class="tool-btn btn btn-ghost btn-square join-item" id="draw_clear_btn" aria-label="Clear sketch" title="Erase the whole sketch">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7l16 0"></path><path d="M10 11l0 6"></path><path d="M14 11l0 6"></path><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"></path><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"></path></svg>
			</button>
			</nav>
		</div>
	</div>
	<script type="module" src="/scripts/renderer.js"></script>
</body>
</html>
