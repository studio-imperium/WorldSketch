<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>worldsplat — Sketch a world. Walk inside it.</title>
	<meta name="description" content="worldsplat turns rough sketches into explorable 3D worlds, one seamless gaussian splat at a time.">
	<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='%23111110'%3E%3Cellipse cx='9' cy='10' rx='6' ry='5.2' transform='rotate(-18 9 10)'/%3E%3Cellipse cx='17' cy='8.5' rx='3.4' ry='2.9' transform='rotate(24 17 8.5)'/%3E%3Cellipse cx='15.5' cy='16.5' rx='4.4' ry='3.6' transform='rotate(-8 15.5 16.5)'/%3E%3Ccircle cx='6.5' cy='17.5' r='2.1'/%3E%3C/g%3E%3C/svg%3E">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/site.css">
	<script>
		// "/" is the registered Hugging Face OAuth redirect URL; hand callback
		// hits to the sign-in page, which finishes the token exchange.
		if (/[?&](code|error)=/.test(location.search)) location.replace("/login" + location.search + location.hash)
	</script>
	<script type="importmap">
	{
		"imports": {
			"three": "/lib/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
			"spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
		}
	}
	</script>
	<style>
		main { max-width: 1440px; margin: 0 auto; padding: 0 36px; }

		/* ---- hero ---- */
		.hero {
			display: grid;
			grid-template-columns: 1.15fr 0.85fr;
			gap: 48px;
			align-items: center;
			padding: 96px 0 56px;
		}
		.hero h1 {
			font-size: clamp(48px, 6.4vw, 84px);
			font-weight: 500;
			line-height: 1.03;
			letter-spacing: -0.04em;
			text-wrap: balance;
		}
		.hero-cta { display: flex; gap: 12px; margin-top: 44px; }
		.hero-copy {
			font-size: 18px;
			line-height: 1.55;
			color: var(--ink-soft);
			max-width: 46ch;
			justify-self: end;
		}

		/* ---- showcase card with the live splat ---- */
		.showcase {
			background: var(--card);
			border-radius: 26px;
			padding: 10px;
			margin-bottom: 28px;
		}
		.tabs {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
			gap: 8px;
			padding: 2px 2px 10px;
		}
		.tab {
			height: 46px;
			border-radius: 9999px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 9px;
			font-size: 15px;
			font-weight: 500;
			color: var(--ink-soft);
			cursor: pointer;
			transition: background-color 0.4s ease, box-shadow 0.4s ease;
		}
		.tab.active {
			background: var(--white);
			color: var(--ink);
			box-shadow: 0 1px 2px rgba(20, 20, 15, 0.07), 0 5px 18px rgba(20, 20, 15, 0.05);
		}
		.orb { width: 15px; height: 15px; border-radius: 50%; flex: none; }
		.orb-sketch { background: radial-gradient(circle at 35% 30%, #f2a56b, #d96b2b 75%); }
		.orb-splat { background: radial-gradient(circle at 35% 30%, #a8c6e8, #5e8a5e 55%, #2e4a3a); }
		.orb-explore { background: radial-gradient(circle at 35% 30%, #dcdad4, #8e8c86); }

		.stage {
			position: relative;
			height: min(72vh, 760px);
			min-height: 460px;
			border-radius: 18px;
			background: var(--panel);
			overflow: hidden;
			touch-action: none;
		}
		.stage canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
			opacity: 0;
			background: var(--panel); /* hard-opaque backing so layers can't bleed through */
		}
		/* Bottom (splat) layer: revealed instantly — it only ever shows through the
		   top layer's fade, so transitioning it just invites compositor glitches. */
		.stage canvas.base { opacity: 1; }
		/* Top (sketch) layer: the 5-second sketch-to-splat crossfade. */
		.stage canvas.fade { transition: opacity 1.4s ease; }
		.stage canvas.fade.show { opacity: 1; }
		.stage canvas:active { cursor: grabbing; }
		.stage-hint {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 15px;
			color: var(--ink-faint);
			pointer-events: none;
		}
		@media (max-width: 900px) {
			main { padding: 0 20px; }
			.hero { grid-template-columns: 1fr; gap: 28px; padding: 56px 0 36px; }
			.hero-copy { justify-self: start; }
			.tab span.tab-word { display: none; }
			.stage { height: 58vh; min-height: 380px; }
		}
	</style>
</head>
<body>
	<header class="nav">
		<a class="wordmark" href="/" aria-label="worldsplat home">
			<svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
				<ellipse cx="9" cy="10" rx="6" ry="5.2" transform="rotate(-18 9 10)"/>
				<ellipse cx="17" cy="8.5" rx="3.4" ry="2.9" transform="rotate(24 17 8.5)"/>
				<ellipse cx="15.5" cy="16.5" rx="4.4" ry="3.6" transform="rotate(-8 15.5 16.5)"/>
				<circle cx="6.5" cy="17.5" r="2.1"/>
			</svg>
			worldsplat
		</a>
		<div class="nav-cta">
			<a class="pill pill-outline" href="mailto:hello@worldsplat.ai">Contact sales</a>
			<a class="pill pill-black" href="/login">Log in</a>
		</div>
	</header>

	<main>
		<section class="hero">
			<div>
				<h1>Sketch a world.<br>Walk inside it.</h1>
				<div class="hero-cta">
					<a class="pill pill-black pill-lg" href="/login">Sign up</a>
					<a class="pill pill-outline pill-lg" href="mailto:hello@worldsplat.ai?subject=worldsplat%20demo">Book a demo</a>
				</div>
			</div>
			<p class="hero-copy">Powering worldbuilders, game designers, and daydreamers. Draw a rough plot and worldsplat grows it into an explorable 3D world&nbsp;&mdash; one seamless gaussian splat at a time.</p>
		</section>

		<section class="showcase" aria-label="Live world preview">
			<div class="tabs">
				<button class="tab active" type="button" data-phase="sketch"><span class="orb orb-sketch"></span><span class="tab-word">Sketch</span></button>
				<button class="tab" type="button" data-phase="splat"><span class="orb orb-splat"></span><span class="tab-word">Splat</span></button>
				<a class="tab" href="/app"><span class="orb orb-explore"></span><span class="tab-word">Explore</span></a>
			</div>
			<div class="stage" id="stage">
				<div class="stage-hint" id="stage-hint">loading world&hellip;</div>
			</div>
		</section>
	</main>

	<footer class="footer">
		<span>&copy; 2026 worldsplat</span>
	</footer>

	<script type="module" src="/scripts/landing.js?v=worldsplat-1"></script>
</body>
</html>
