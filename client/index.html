	<style>
		main { max-width: 1440px; margin: 0 auto; padding: 0 36px; }

		/* ---- hero ---- */
		.hero {
			display: grid;
			grid-template-columns: 1.15fr 0.85fr;
			gap: 48px;
			align-items: center;
			padding: 16px 0 36px;
		}
		.hero h1 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(46px, 6.2vw, 82px);
			font-weight: 400;
			line-height: 1.05;
			letter-spacing: -0.012em;
			text-wrap: balance;
		}
		.hero-cta { display: flex; gap: 12px; margin-top: 40px; }
		.pill-hf {
			height: 56px;
			gap: 14px;
			padding: 0 22px 0 10px;
			border-radius: 16px;
			font-size: 17px;
			font-weight: 600;
		}
		.pill-hf .hf-badge {
			display: grid;
			place-items: center;
			width: 38px;
			height: 38px;
			border-radius: 11px;
			background: #ffd66b;
			font-size: 19px;
		}
		.pill-hf svg {
			width: 19px;
			height: 19px;
			margin-left: 6px;
			fill: none;
			stroke: currentColor;
			stroke-width: 1.8;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		[data-hf-login][aria-busy="true"] { opacity: 0.7; pointer-events: none; }
		.hero-copy {
			margin-top: 22px;
			font-size: 18px;
			line-height: 1.55;
			color: var(--ink-soft);
			max-width: 46ch;
		}
		.hero-error { margin-top: 14px; font-size: 14px; color: #b3261e; max-width: 46ch; }
		.hero-error.hidden { display: none; }

		/* ---- hero cursor-follower splat (right column) ---- */
		.hero-stage {
			position: relative;
			height: clamp(570px, 51vw, 810px); /* 1.5× — the mech scales with its canvas */
			overflow: hidden;
			transform: translateY(-6%); /* sit the mech a touch higher in the hero */
		}
		.hero-stage canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			pointer-events: none; /* ambient — it watches the cursor, never captures it */
		}

		/* ---- showcase: world on the left, copy on the right ---- */
		/* Scroll-driven morph: the tall band supplies the scroll distance while the
		   row stays sticky inside it; scroll progress scrubs the sketch layer's
		   opacity so the block-out dissolves into the real splat. The stage sits
		   directly on the page — the canvas clears to the same paper colour so
		   there is no inner window. */
		.showcase-scroll { height: 300vh; margin-bottom: 28px; }
		.showcase {
			position: sticky;
			top: 0;
			height: 100vh;
		}
		/* The copy floats ABOVE the full-bleed canvas, pinned to the content column's
		   right edge; pointer events fall through to the draggable world below. */
		.showcase-copy {
			position: absolute;
			right: 0;
			top: 50%;
			transform: translateY(-50%);
			z-index: 1;
			text-align: right;
			pointer-events: none;
		}
		.showcase-copy h2 u {
			text-decoration-thickness: 0.045em;
			text-underline-offset: 0.09em;
		}
		.showcase-copy h2 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			line-height: 1.05;
			letter-spacing: -0.012em;
			text-wrap: balance;
			max-width: 14ch;
		}
		/* Full-bleed stage: the canvas spans the whole viewport, so a big world runs
		   off the actual screen edge instead of being sliced at a mid-page rectangle.
		   landing.js shifts the render window so the world sits around the left
		   third, leaving the right side to the copy. */
		.stage {
			position: absolute;
			top: 0;
			left: 50%;
			transform: translateX(-50%);
			width: 100vw;
			height: 100%;
			background: var(--paper);
			overflow: hidden;
			touch-action: none;
		}
		.stage canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
			opacity: 0;
			background: var(--paper); /* hard-opaque backing so layers can't bleed through */
		}
		/* Bottom (splat) layer: revealed instantly — it only ever shows through the
		   top layer's fade, so transitioning it just invites compositor glitches. */
		.stage canvas.base { opacity: 1; }
		/* Top (sketch) layer: scroll progress drives its inline opacity — no CSS
		   transition, the scrub itself is the animation. */
		.stage canvas.fade { will-change: opacity; }
		.stage canvas:active { cursor: grabbing; }
		.stage-hint {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 15px;
			color: var(--ink-faint);
			pointer-events: none;
		}

		/* ---- shared eyebrow (mono, technical) ---- */
		.eyebrow {
			font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			font-size: 12px;
			font-weight: 500;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--ink-faint);
		}

		/* ---- scroll-reveal: the gaussian resolves from its centre ---- */
		.reveal {
			position: relative;
			min-height: min(88vh, 820px);
			margin-top: 44px;
			border-top: 1px solid var(--line);
			border-bottom: 1px solid var(--line);
			background: var(--paper);
			overflow: hidden;
			isolation: isolate;
		}
		/* the band's animated pixel-wave background is a WebGL canvas mounted by
		   assets/bg_2.js — it replaced the old CSS grid + drifting-code layers */
		/* the real gaussian render — it fades in when the band scrolls into view */
		.reveal-splat {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			pointer-events: none;
			z-index: 1;
			opacity: 0;
			transition: opacity 0.9s ease;
		}
		.reveal-splat.show { opacity: 1; }
		.reveal-lead {
			position: relative;
			z-index: 2;
			max-width: 1440px;
			margin: 0 auto;
			padding: clamp(44px, 7vw, 92px) 36px 0;
			pointer-events: none;
		}
		.reveal-lead h2 {
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			letter-spacing: -0.012em;
			line-height: 1.05;
			max-width: 17ch;
			text-wrap: balance;
		}
		/* sentence closes on the right of the gaussian — same serif voice as the hero */
		.reveal-tail {
			position: absolute;
			right: clamp(12px, 2.5vw, 48px);
			top: 82%;
			transform: translateY(-50%);
			z-index: 2;
			max-width: 9ch;
			font-family: "Newsreader", Georgia, "Times New Roman", serif;
			font-size: clamp(38px, 4.6vw, 68px);
			font-weight: 400;
			letter-spacing: -0.012em;
			line-height: 1.05;
			text-wrap: balance;
			pointer-events: none;
		}

		@media (max-width: 900px) {
			main { padding: 0 20px; }
			.hero { grid-template-columns: 1fr; gap: 28px; padding: 32px 0 28px; }
			.hero-stage { height: 69vw; min-height: 390px; }
			.showcase-scroll { height: 220vh; }
			.showcase-copy { top: auto; bottom: 8vh; transform: none; }
			.showcase-copy h2 { font-size: clamp(30px, 7vw, 44px); }
			.reveal { min-height: 78vh; }
			.reveal-lead { padding-left: 20px; padding-right: 20px; }
		}
	</style>
</head>
<body>
	<header class="nav">

				<ellipse cx="17" cy="8.5" rx="3.4" ry="2.9" transform="rotate(24 17 8.5)"/>
				<ellipse cx="15.5" cy="16.5" rx="4.4" ry="3.6" transform="rotate(-8 15.5 16.5)"/>
				<circle cx="6.5" cy="17.5" r="2.1"/>
			</svg>
			worldsplat
		</a>
	</header>

	<main>
		<section class="hero">
			<div>
				<h1>Build anything,<br>bring it to life.</h1>
				<p class="hero-copy">Powering daydreamers.<br>Turn your 3D creations into detailed splats.</p>
				<div class="hero-cta">
					<a class="pill pill-black pill-hf" href="/app/" data-hf-login>
						<span class="hf-badge" aria-hidden="true">&#129303;</span>
						<span>Continue with Hugging Face</span>
						<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
					</a>
				</div>
				<p class="hero-error hidden" id="hero-error" role="alert"></p>
			</div>
			<div class="hero-stage" id="hero-stage" aria-hidden="true"></div>
		</section>

		<div class="showcase-scroll" id="showcase-scroll">
			<section class="showcase" aria-label="Live world preview">
				<div class="stage" id="stage">
					<div class="stage-hint" id="stage-hint">loading world&hellip;</div>
				</div>
				<div class="showcase-copy">
					<h2>You lay the blueprints, we make it <u>real</u></h2>
				</div>
			</section>
		</div>
	</main>

	<section class="reveal" id="reveal" aria-label="A world is a cloud of gaussians">
		<div class="reveal-lead">
			<h2>A world is a</h2>
		</div>
		<p class="reveal-tail" aria-hidden="true">a cloud of gaussians.</p>
	</section>

	

	<script type="module">
		// The hero CTA starts Hugging Face OAuth straight away, and "/" is also
		// the registered OAuth redirect URL — a callback hitting the landing page
		// finishes the token exchange here and opens the editor.
		import { getConfig } from "/scripts/api.js"
		import { configureHuggingFaceAuth, finishHuggingFaceSignIn, getHuggingFaceAuth, signInHuggingFace } from "/scripts/huggingface-auth.js"

		const errorBox = document.getElementById("hero-error")
		const ctas = [...document.querySelectorAll("[data-hf-login]")]
		const setBusy = busy => ctas.forEach(cta => busy ? cta.setAttribute("aria-busy", "true") : cta.removeAttribute("aria-busy"))
		const showError = error => {
			errorBox.textContent = error?.message || "Could not sign in with Hugging Face. Please try again."
			errorBox.classList.remove("hidden")
			setBusy(false)
		}

		const configured = getConfig().then(config => configureHuggingFaceAuth(config?.generation))

		if (/[?&](code|error)=/.test(location.search)) {
			setBusy(true)
			configured
				.then(() => finishHuggingFaceSignIn())
				.then(finished => {
					if (!getHuggingFaceAuth().signedIn) throw new Error("Hugging Face sign-in did not complete. Please try again.")
					// Only a completed OAuth round-trip counts as a conversion.
					if (finished?.handled) window.posthog?.capture("login_completed", {}, { send_instantly: true })
					location.replace("/app/")
				})
				.catch(error => {
					window.posthog?.capture("login_failed", { error: error?.message })
					showError(error)
				})
		}

		for (const cta of ctas) {
			cta.addEventListener("click", event => {
				event.preventDefault()
				errorBox.classList.add("hidden")
				cta.setAttribute("aria-busy", "true")
				window.posthog?.capture("login_started")
				configured
					.then(() => {
						if (getHuggingFaceAuth().signedIn) location.assign("/app/")
						else return signInHuggingFace()
					})
					.catch(error => {
						window.posthog?.capture("login_failed", { error: error?.message })
						showError(error)
					})
			})
		}
	</script>
	<script type="module" src="/assets/bg.js?v=webgl-2"></script>
	<script type="module" src="/assets/bg_2.js?v=webgl-4"></script>

	<script type="module" src="/scripts/hero-splat.js?v=11"></script>
